<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suresh & Rubini Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --maroon: #800000;
            --cream: #FFFDD0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--cream);
            font-family: 'Poppins', sans-serif;
            color: #333;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            border: 8px double var(--gold);
            padding: 40px 20px;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: var(--maroon);
            margin-bottom: 10px;
        }

        .names {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--gold);
            margin: 20px 0;
        }

        .details {
            font-size: 1.2rem;
            line-height: 1.8;
            margin: 30px 0;
        }

        .date-box {
            display: inline-block;
            border-top: 2px solid var(--gold);
            border-bottom: 2px solid var(--gold);
            padding: 10px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--maroon);
        }

        .venue {
            margin-top: 30px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        .map-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: var(--maroon);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .map-btn:hover {
            background-color: var(--gold);
        }

        /* Flower Decoration */
        .decoration {
            width: 80px;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://cdn-icons-png.flaticon.com/512/2913/2913455.png" class="decoration" alt="flower">
        
        <p style="letter-spacing: 3px; font-weight: bold; color: var(--gold);">SAVE THE DATE</p>
        
        <div class="names">
            S. Suresh <br>
            <span style="font-size: 1.5rem; color: #555;">&</span> <br>
            Rubini
        </div>

        <p class="details">
            We cordially invite you to celebrate the wedding of our children.
        </p>

        <div class="date-box">
            20<sup>th</sup> APRIL 2026
        </div>

        <div class="venue">
            <h3>Venue:</h3>
            <p><strong>Anitha Mahal</strong><br>
            Sothupakkam, Tamil Nadu</p>
        </div>

        <a href="https://www.google.com/maps/search/Anitha+Mahal+Sothupakkam" target="_blank" class="map-btn">📍 View Location on Map</a>

        <br><br>
        <p style="font-family: 'Great Vibes'; font-size: 1.5rem; color: var(--maroon);">With Best Compliments from Family & Friends</p>
    </div>

</body>
</html>
